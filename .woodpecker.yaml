when:
  - event: push
    branch: master
  - event: [pull_request, manual, cron]

workspace:
  base: /srv
  path: dagd

services:
  - name: db
    image: docker.io/library/mariadb:latest
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: dagd

steps:
  - name: test
    image: docker.io/library/debian:13
    environment:
      DaGdConfigFile: ../container/config.container.php
    commands:
      - rm -f .ready-for-ci
      - >-
        apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y
        --no-install-recommends apache2 ca-certificates curl git libapache2-mod-php netcat-openbsd
        php-apcu php-cli php-curl php-gd php-intl php-mysql php-pear tzdata
      - >-
        curl -fsSL
        https://github.com/mikepultz/netdns2/archive/refs/tags/v1.5.5.tar.gz
        -o /tmp/netdns2.tar.gz
      - >-
        echo
        "69c65d7d1a775d0b4d4a6b0b0ac8cfbb242aa5d2f03b331400ad7c2d1fdf0eb6  /tmp/netdns2.tar.gz"
        | sha256sum --check -
      - mkdir /tmp/netdns2
      - >-
        tar -xzf /tmp/netdns2.tar.gz
        --strip-components=1 -C /tmp/netdns2
      - cd /tmp/netdns2 && pear package
      - pear install /tmp/netdns2/Net_DNS2-1.5.5.tgz
      - rm -rf /tmp/netdns2 /tmp/netdns2.tar.gz
      - a2enmod rewrite
      - mkdir -p /usr/share/fonts/dejavu
      - >-
        ln -s /usr/share/fonts/truetype/dejavu/DejaVuSansMono.ttf
        /usr/share/fonts/dejavu/DejaVuSansMono.ttf
      - rm -rf /var/lib/apt/lists/*
      - bash ./container/entrypoint.sh &
      - bash ./container/entrypoint.sh worker &
      - |
        for i in $(seq 1 60); do
          [ -f .ready-for-ci ] && break
          echo "waiting for app to become ready..."
          sleep 2
        done
        test -f .ready-for-ci
      - php --info
      - ./tests/dagd-test -u http://127.0.0.1
      - ./scripts/dagd-admin g | grep State | grep enabled
      - './scripts/dagd-admin g | grep Accesses: | grep 7d'
      - ./scripts/dagd-admin g | grep "defaulting to \-\-status"
      - ./scripts/dagd-admin g -d | grep "Updated in"
      - ./scripts/dagd-admin g | grep State | grep disabled
      - ./scripts/dagd-admin g -e | grep "Updated in"
      - ./scripts/dagd-admin g | grep State | grep enabled
      - ./scripts/dagd-admin g -r https://wikipedia.org/ | grep "Updated in"
      - ./scripts/dagd-admin g -S | grep wikipedia
      - ./scripts/dagd-admin g -r https://google.com/ | grep "Updated in"
